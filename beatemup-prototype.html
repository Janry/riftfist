    touch-action:none;overscroll-behavior:none;

<body>
<canvas id="c"></canvas>
<div id="hint">рух ліворуч · УДАР/СТРИБ/СПЕЦ праворуч · пройди над зброєю=підбір · озброєний СПЕЦ=кидок · сильний удар збиває з ніг</div>
<script>
/* ============================================================
   BEAT 'EM UP — прототип ядра  (v5: баланс винесено в data-шар)
   ------------------------------------------------------------
   DATA LAYER (нижче) — все, що "наповнюється":
     THEME   = IP-залежна косметика (імена/кольори) — свапабельна.
     BALANCE = чисельні ручки відчуття/балансу (НЕ вшивати в код).
     WEAPONS = таблиця зброї (дані).
     ATTACKS = таблиця атак гравця (дані).
     ENEMIES = архетипи ворогів (дані, не код) — звідси росте ростер.
   ENGINE (далі) — механіка; читає числа з DATA LAYER, своїх не тримає.
   Рендер-геометрія (форма спрайтів) лишається в ENGINE — це не баланс.
   ============================================================ */

/* ---------- THEME (косметика, IP сюди) ---------- */
const THEME = {
  hero:    { name:"DOC", body:"#5fd0c4", accent:"#bff7ef" },
  enemies: {                                  // косметика за ключем архетипу
    grunt:  { name:"GROMBLE",  body:"#c2607f", accent:"#ffd2e0" },
    rusher: { name:"SKITTER",  body:"#d9824f", accent:"#ffd9b0" },
    brute:  { name:"BRUTOID",  body:"#8c6fae", accent:"#e6d6ff" },
    ranged: { name:"SPITTER",  body:"#7fae5f", accent:"#dff0c8" },
    boss:   { name:"GROMBLE",  body:"#a83f63", accent:"#ffd2e0" }
  },
  // виміри як дані: косметика (назва/настрій/палітра/фон) + склад ворогів. dim циклічно індексує масив.
  dimensions: [
    { name:"НЕОНОВІ КАНАЛИ", flavor:"мокрий бетон і дешеве світло", bg:["#161a2b","#0d1322"], floor:"rgba(120,200,255,.05)", waves:3, mix:[['grunt',3],['rusher',2]] },
    { name:"ЖЕЛЕ-СЕКТОР",    flavor:"тут усе трохи липке",          bg:["#291634","#150b1d"], floor:"rgba(255,150,220,.06)", waves:3, mix:[['grunt',2],['brute',2],['rusher',1]] },
    { name:"СЕРВЕРНЕ ПЕКЛО",  flavor:"гул кулерів і чиста ненависть", bg:["#102220","#07120e"], floor:"rgba(120,255,200,.05)", waves:4, mix:[['rusher',2],['ranged',2],['grunt',2]] },
    { name:"ІРЖАВИЙ ПОЯС",    flavor:"метал, пил, нічого живого",    bg:["#241a12","#130c07"], floor:"rgba(255,200,120,.05)", waves:3, mix:[['brute',2],['grunt',2],['ranged',1]] }
  ]
};

/* ---------- HERO_SKINS (спрайт-як-дані; IP-залежна косметика — свапабельна) ----------
   Рішення (явне, фіксує зняте IP-обмеження для дев-білду): тримаємо ДВІ шкіри героя
   й перемикаємось між ними наживо (клавіша T або тап «АРТ»). 'rick' — впізнаваний
   R&M-оммаж (дефолт зараз). 'doc' — оригінал «у дусі», IP-safe версія-страховка.
   Новий герой = ще один рядок тут, без правки рушія. Стиль — DD&BT (16-біт пікселі).
   sprite: { w,h — нативна сітка в пікселях; pal — символ→колір ('.'/відсутній = прозоро);
   px — рядки сітки, по w символів. Рушій малює масштабовані пікселі (drawSpritePixels). */
const HERO_SKINS = {
  rick: { name:"RIQ", body:"#cfe0e8", accent:"#aecfdc",
    sprite:{ w:20, h:32,
      pal:{ '.':null, H:'#aecfdc', h:'#88a8b7', d:'#5f8190', S:'#f0cda3', s:'#cda079',
            B:'#5f8190', E:'#20242c', W:'#eef3f5', r:'#d9f0f7', K:'#7c4a44', C:'#f1f5f7',
            c:'#c2ced5', T:'#6fa6b0', t:'#4f868f', P:'#9c7a52', p:'#6f5436', O:'#23282f' },
      px:[ "......HHH...........",   // високий асиметричний чуб
           ".....HHHHH..HH......",
           "...HHHHHHHHHHHHH....",
           "..HHHHHHHHHHHHHHHH..",
           "..HHhHHHHHHHHHhHHH..",
           "..dHHHhHHHHHHhHHHd..",
           ".dHHHHHHHHHHHHHHHHd.",
           ".ddHHHHSSSSSSHHHHdd.",   // край волосся + лоб
           ".dHHHHSSSSSSSSHHHHd.",
           "..HHHSSSSSSSSSSHHH..",
           "..HHBBBBBBBBBBBBHH..",   // важкий унібров
           "..HSsEEsssEEsSSHH...",   // мляві очі-щілинки
           "...HSSSSSSSSSSSSH...",
           "...HSSSSssssSSSSH...",   // ніс
           "....SSSSKKKKSSSS....",   // рот
           ".....sSSSSSSSrr.....",   // слина
           "......sSSSSSr.......",
           ".....CCcSSSScCC.....",   // шия + комір
           "....CCCcTTTTcCCC....",   // плечі + сорочка
           "...CCCCcTTttCcCCC...",
           "..sCCCCCTTTTCCCCCs..",   // руки
           "..SCCCCCCTTCCCCCCS..",   // кисті
           "...CCCCCCTTCCCCCC...",
           "...CCCCcCTTCcCCCC...",
           "...CCCCCCCCCCCCCC...",
           "....CCCCPPPPCCCC....",   // поділ + штани
           ".....CPPPPPPPPC.....",
           "....PPPPPPPPPPPP....",
           ".....PPPP..PPPP.....",   // ноги
           ".....PPpp..ppPP.....",
           ".....OOOO..OOOO.....",   // взуття
           ".....OOOO..OOOO....." ] } },
  doc: { name:"DOC", body:"#5fd0c4", accent:"#bff7ef",
    sprite:{ w:16, h:24,
      pal:{ '.':null, H:'#34505c', h:'#22343d', S:'#e8c39a', s:'#c39e75', G:'#2a3a44',
            A:'#bff7ef', J:'#5fd0c4', j:'#3fa89c', O:'#243038', K:'#8a4f48' },
      px:[ "......HHHH......",   // коротка зачіска (інший силует, не Рік)
           "....HHHHHHHH....",
           "...HHHHHHHHHH...",
           "..HHHSSSSSSHHH..",
           "...HSSSSSSSSH...",
           "...SGGGGGGGGS...",   // окуляри (замість унібрів)
           "...SGAAGGAAGS...",
           "...SSSSSSSSSS...",
           "....SSKKKKSS....",   // рот
           "....sSSSSSSs....",
           ".....AJJJJA.....",   // комір
           "...JJAJJJJAJJ...",   // плечі комбінезона
           "..JJJJJJJJJJJJ..",
           "..sJJjJJJJjJJs..",
           "..SJJAAJJAAJJS..",   // пояс-акцент + кисті
           "...JJJJJJJJJJ...",
           "...JJjJJJJjJJ...",
           "...JJJJ..JJJJ...",   // ноги
           "...JJjJ..JjJJ...",
           "...JJjJ..JjJJ...",
           "...JJj....jJJ...",
           "...Jj......jJ...",
           "...OOO....OOO...",   // черевики
           "...OOO....OOO..." ] } }
};

/* ---------- BALANCE (ручки відчуття) ---------- */
const BALANCE = {
  world:  { depthFactor:0.7, jumpInvulnZ:22 },          // глибина повільніша ×0.7; у високому стрибку (z>22) удари не влучають
  physics:{ grav:0.8, jumpV:14 },
  input:  { moveDeadzone:0.18, faceThreshold:0.2 },
  field:  { top:0.45, bottom:0.92, marginX:30 },        // top/bottom — частки висоти екрана
  combat: { hitBackReach:10, hitDepth:28 },             // вікно влучання: запас по x назад / збіг по глибині
  combo:  { timer:70 },
  player: { hp:100, speed:3.0, hurtDur:14, hurtDecay:0.8, hurtIframe:24,
            air:{x:1.9,y:0.6}, airAtkDrift:1.4,
            pickup:{x:30,y:26}, specialMinHp:14, specialHpFloor:8 },
  enemy:  { downDur:46, getupDur:20, getupCool:18, hurtDur:12, downKbBonus:5 },
  waves:  { bossEvery:3, base:2, max:5 },
  dimension: { waves:3, introDur:120, clearedDur:140, healOnClear:40 },   // звичайних хвиль до міні-боса; таймери банерів (кадри); хіл при зачистці
  weapon: { throwSpeed:11, throwStop:6, spin:0.5, projHit:{x:26,y:28}, maxOnField:2, dropChance:0.7 },
  feel:   { hitFlash:6, shakeBase:3, shakeKbMul:0.3, shakeDecay:0.86,
            shakePickup:2, shakeThrow:3, shakeSpecial:5, shakeLand:3, shakeBreak:3 }
};

/* ---------- WEAPONS (дані) ---------- */
const WEAPONS={
  pipe: {name:'ТРУБА',  color:'#e6dcae', reach:78, dmg:14, kb:13, stop:7, active:[5,13], dur_f:24, uses:8, throwDmg:20, throwKb:16},
  blade:{name:'КЛИНОК', color:'#bfe3ff', reach:62, dmg:21, kb:9,  stop:8, active:[4,10], dur_f:20, uses:5, throwDmg:26, throwKb:12}
};

/* ---------- ATTACKS (дані) ---------- */
const ATTACKS={
  a1:{dur:16,active:[5,10],reach:46,dmg:7, kb:4, stop:4,next:'a2',wnd:12},
  a2:{dur:18,active:[6,11],reach:48,dmg:8, kb:5, stop:5,next:'a3',wnd:14},
  a3:{dur:26,active:[7,14],reach:58,dmg:16,kb:14,stop:9,next:null,wnd:0,down:true},
  sp:{dur:34,active:[8,20],reach:78,dmg:22,kb:18,stop:10,next:null,wnd:0,cost:12,down:true},
  air:{dur:999,active:[3,30],reach:54,dmg:13,kb:11,stop:7,next:null,wnd:0,down:true}
};

/* ---------- ENEMIES (архетипи, дані) ---------- */
/* theme — ключ у THEME.enemies (косметика); решта — механіка.
   behavior — який AI: 'bruiser' (підбіг-замах-удар) | 'ranged' (тримає дистанцію, кидає снаряд).
   speed = speedMin + rand*speedRnd. kbResist<1 = стійкість до відкиду.
   knockdown:false = не валиться з ніг (бос). Поля shotSpeed/shotDmg/preferDist/fleeDist — лише для ranged. */
const ENEMIES = {
  grunt: { theme:'grunt',  boss:false, behavior:'bruiser', h:48, hp:30,  speedMin:1.1,  speedRnd:0.5,
           approachDist:48, reach:54, windup:16, recover:24, coolAfter:30,
           dmg:10, kbToPlayer:6,  shake:5, kbResist:1,    knockdown:true  },
  rusher:{ theme:'rusher', boss:false, behavior:'bruiser', h:44, hp:18,  speedMin:1.9,  speedRnd:0.4,
           approachDist:40, reach:46, windup:10, recover:16, coolAfter:14,
           dmg:7,  kbToPlayer:5,  shake:4, kbResist:1,    knockdown:true  },
  brute: { theme:'brute',  boss:false, behavior:'bruiser', h:64, hp:70,  speedMin:0.7,  speedRnd:0,
           approachDist:54, reach:60, windup:28, recover:30, coolAfter:34,
           dmg:16, kbToPlayer:11, shake:7, kbResist:0.45, knockdown:true  },
  ranged:{ theme:'ranged', boss:false, behavior:'ranged',  h:48, hp:22,  speedMin:1.15, speedRnd:0.25,
           preferDist:230, fleeDist:130, shotWindup:26, recover:20, coolAfter:46,
           shotSpeed:6.5, shotDmg:9, shotKb:7, shake:4, kbResist:1, knockdown:true },
  boss:  { theme:'boss',   boss:true,  behavior:'bruiser', h:72, hp:180, speedMin:0.85, speedRnd:0,
           approachDist:48, reach:82, windup:22, recover:28, coolAfter:20,
           dmg:18, kbToPlayer:9,  shake:8, kbResist:0.3,  knockdown:false }
};

/* ============================================================
   ENGINE — механіка. Числа беруться з DATA LAYER вище.
   ============================================================ */

/* ---------- CANVAS ---------- */
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){ DPR=Math.min(window.devicePixelRatio||1,2); W=innerWidth; H=innerHeight;
  cv.width=Math.floor(W*DPR); cv.height=Math.floor(H*DPR); ctx.setTransform(DPR,0,0,DPR,0,0); }
addEventListener('resize',resize); resize();

const GRAV=BALANCE.physics.grav, JUMP_V=BALANCE.physics.jumpV;

/* ---------- ВВІД ---------- */
const input={mx:0,my:0,moving:false};
let joyId=null, joyOrigin={x:0,y:0}, joyVec={x:0,y:0};
let lightTouchId=null, specialTouchId=null, jumpTouchId=null;
let lightEdge=false, specialEdge=false, jumpEdge=false;
function btnLight(){   return {x:W-72,  y:H-80,  r:46}; }
function btnJump(){    return {x:W-162, y:H-112, r:42}; }
function btnSpecial(){ return {x:W-112, y:H-188, r:38}; }
function inCircle(px,py,c){ const dx=px-c.x,dy=py-c.y; return dx*dx+dy*dy<=c.r*c.r; }
function onTouchStart(e){ e.preventDefault();
  for(const t of e.changedTouches){ const x=t.clientX,y=t.clientY;
    if(inRect(x,y,btnSkin())){ toggleSkin(); continue; }              // тап «АРТ» — перемкнути шкіру
    if(inCircle(x,y,btnSpecial())){ specialTouchId=t.identifier; specialEdge=true; continue; }
    if(inCircle(x,y,btnJump())){ jumpTouchId=t.identifier; jumpEdge=true; continue; }
    if(inCircle(x,y,btnLight())){ lightTouchId=t.identifier; lightEdge=true; continue; }
    if(x<W*0.5 && joyId===null){ joyId=t.identifier; joyOrigin={x,y}; joyVec={x:0,y:0}; }
    else if(x>=W*0.5){ lightTouchId=t.identifier; lightEdge=true; } } }
function onTouchMove(e){ e.preventDefault();
  for(const t of e.changedTouches){ if(t.identifier===joyId){
    let dx=t.clientX-joyOrigin.x, dy=t.clientY-joyOrigin.y; const max=60, len=Math.hypot(dx,dy)||1;
    if(len>max){ dx=dx/len*max; dy=dy/len*max; } joyVec={x:dx/max,y:dy/max}; } } }
function onTouchEnd(e){ e.preventDefault();
  for(const t of e.changedTouches){ if(t.identifier===joyId){ joyId=null; joyVec={x:0,y:0}; }
    if(t.identifier===lightTouchId) lightTouchId=null;
    if(t.identifier===specialTouchId) specialTouchId=null;
    if(t.identifier===jumpTouchId) jumpTouchId=null; } }
cv.addEventListener('touchstart',onTouchStart,{passive:false});
cv.addEventListener('touchmove',onTouchMove,{passive:false});
cv.addEventListener('touchend',onTouchEnd,{passive:false});
cv.addEventListener('touchcancel',onTouchEnd,{passive:false});
const keys={};
addEventListener('keydown',e=>{ if(!keys[e.code]){ if(e.code==='KeyJ')lightEdge=true; if(e.code==='KeyK')specialEdge=true; if(e.code==='KeyL'||e.code==='Space')jumpEdge=true; if(e.code==='KeyT')toggleSkin(); } keys[e.code]=true; });
addEventListener('keyup',e=>{ keys[e.code]=false; });
function pollInput(){ let kx=(keys['KeyD']?1:0)-(keys['KeyA']?1:0), ky=(keys['KeyS']?1:0)-(keys['KeyW']?1:0);
  if(joyId!==null){ kx=joyVec.x; ky=joyVec.y; } const len=Math.hypot(kx,ky);
  input.moving=len>BALANCE.input.moveDeadzone; input.mx=input.moving?kx:0; input.my=input.moving?ky:0; }

/* ---------- СВІТ ---------- */
const FIELD=()=>({top:H*BALANCE.field.top, bottom:H*BALANCE.field.bottom});
let screenShake=0, hitStop=0, combo=0, comboTimer=0, tick=0;
function clampField(e){ const f=FIELD(); e.y=Math.max(f.top,Math.min(f.bottom,e.y));
  e.x=Math.max(BALANCE.field.marginX,Math.min(W-BALANCE.field.marginX,e.x)); }

/* ---------- ЗБРОЯ ---------- */
let weapons=[], projectiles=[];
function spawnWeapon(type){ const f=FIELD();
  weapons.push({ x:90+Math.random()*(W-180), y:f.top+Math.random()*(f.bottom-f.top),
    type:type||(Math.random()<0.5?'pipe':'blade'), bob:Math.random()*6 }); }

/* ---------- ГРАВЕЦЬ ---------- */
const player={ x:W*0.3, y:H*0.7, z:0, vz:0, vx:0, vy:0, face:1, hp:BALANCE.player.hp, hpMax:BALANCE.player.hp,
  state:'idle', t:0, chain:0, chainWindow:0, windowed:false, iframe:0, speed:BALANCE.player.speed,
  atk:null, atkName:null, hitDone:false, airAtk:false, weapon:null, breakAfter:false, flash:0 };

/* активна шкіра героя (свапабельна наживо: клавіша T / тап «АРТ») */
let heroSkin='rick';
const curSkin=()=>HERO_SKINS[heroSkin];
function toggleSkin(){ heroSkin = heroSkin==='rick' ? 'doc' : 'rick'; }
function btnSkin(){ return {x:14, y:60, w:120, h:22}; }
function inRect(px,py,r){ return px>=r.x && px<=r.x+r.w && py>=r.y && py<=r.y+r.h; }

function startAttack(name){
  const air=(player.state==='air'||player.z>0||player.vz>0||name==='air');
  player.state='attack'; player.atkName=name; player.t=0; player.hitDone=false; player.windowed=false; player.airAtk=air;
  if(name==='wpn'){ const w=WEAPONS[player.weapon.type];
    player.atk={dur:w.dur_f, active:w.active, reach:w.reach, dmg:w.dmg, kb:w.kb, stop:w.stop, next:null, wnd:0};
    player.weapon.uses--; if(player.weapon.uses<=0) player.breakAfter=true;
  } else { player.atk=ATTACKS[name]; }
  if(name==='sp'){ player.hp=Math.max(BALANCE.player.specialHpFloor,player.hp-player.atk.cost); screenShake=Math.max(screenShake,BALANCE.feel.shakeSpecial); }
}
function throwWeapon(){ const w=WEAPONS[player.weapon.type];
  projectiles.push({x:player.x+player.face*16, y:player.y, vx:player.face*BALANCE.weapon.throwSpeed, face:player.face,
    dmg:w.throwDmg, kb:w.throwKb, type:player.weapon.type, spin:0, dead:false});
  player.weapon=null; screenShake=Math.max(screenShake,BALANCE.feel.shakeThrow); }
function stepAir(){ player.z+=player.vz; player.vz-=GRAV; if(player.z<=0){ player.z=0; player.vz=0; return true; } return false; }

function updatePlayer(){
  player.t++; if(player.iframe>0) player.iframe--; if(player.chainWindow>0) player.chainWindow--; if(player.flash>0) player.flash--;
  if(!player.weapon && player.z===0 && (player.state==='idle'||player.state==='walk')){
    for(let i=0;i<weapons.length;i++){ const g=weapons[i];
      if(Math.abs(g.x-player.x)<BALANCE.player.pickup.x && Math.abs(g.y-player.y)<BALANCE.player.pickup.y){
        player.weapon={type:g.type, uses:WEAPONS[g.type].uses}; weapons.splice(i,1); screenShake=Math.max(screenShake,BALANCE.feel.shakePickup); break; } } }

  if(player.state==='hurt'){ player.x+=player.vx; player.y+=player.vy; player.vx*=BALANCE.player.hurtDecay; player.vy*=BALANCE.player.hurtDecay;
    if(player.t>BALANCE.player.hurtDur) player.state='idle'; clampField(player); return; }

  if(player.state==='attack'){
    const a=player.atk;
    if(!player.hitDone && player.t>=a.active[0] && player.t<=a.active[1]){
      for(const en of enemies){ if(en.dead) continue;
        const dx=(en.x-player.x)*player.face, dy=Math.abs(en.y-player.y);
        if(dx>-BALANCE.combat.hitBackReach && dx<a.reach && dy<BALANCE.combat.hitDepth){ hitEnemy(en,a,player.face); player.hitDone=true; } } }
    if(player.airAtk){ if(input.moving) player.x+=input.mx*BALANCE.player.airAtkDrift;
      const landed=stepAir(); clampField(player);
      if(landed||player.t>=a.dur){ player.state='idle'; player.airAtk=false; if(landed) screenShake=Math.max(screenShake,BALANCE.feel.shakeLand); }
      return; }
    if(a.next && player.t>=a.active[1] && !player.windowed){ player.windowed=true; player.chainWindow=a.wnd; }
    if(a.next && player.chainWindow>0 && lightEdge){ startAttack(a.next); lightEdge=false; return; }
    if(player.t>=a.dur){ player.state='idle'; player.windowed=false;
      if(player.breakAfter){ player.weapon=null; player.breakAfter=false; screenShake=Math.max(screenShake,BALANCE.feel.shakeBreak); } }
    return;
  }

  if(player.state==='air'){
    if(input.moving){ player.x+=input.mx*BALANCE.player.air.x; player.y+=input.my*BALANCE.player.air.y; if(Math.abs(input.mx)>BALANCE.input.faceThreshold) player.face=input.mx>0?1:-1; }
    if(lightEdge){ startAttack('air'); return; }
    if(specialEdge && player.hp>BALANCE.player.specialMinHp){ startAttack('sp'); return; }
    const landed=stepAir(); clampField(player); if(landed) player.state='idle'; return;
  }

  if(jumpEdge){ player.vz=JUMP_V; player.state='air'; }
  else if(lightEdge){ startAttack(player.weapon?'wpn':'a1'); }
  else if(specialEdge){ if(player.weapon) throwWeapon(); else if(player.hp>BALANCE.player.specialMinHp) startAttack('sp'); }
  else { if(input.moving){ player.vx=input.mx*player.speed; player.vy=input.my*player.speed*BALANCE.world.depthFactor;
      player.x+=player.vx; player.y+=player.vy; if(Math.abs(input.mx)>BALANCE.input.faceThreshold) player.face=input.mx>0?1:-1; player.state='walk'; }
    else player.state='idle'; }
  clampField(player);
}

function hitEnemy(en,a,dir){
  const A=ENEMIES[en.type];
  en.hp-=a.dmg; en.vx=dir*a.kb*A.kbResist; en.vy=0; en.flash=BALANCE.feel.hitFlash;
  hitStop=Math.max(hitStop,a.stop); screenShake=Math.max(screenShake,BALANCE.feel.shakeBase+a.kb*BALANCE.feel.shakeKbMul); combo++; comboTimer=BALANCE.combo.timer;
  if(en.hp<=0){ en.dead=true; en.deadT=0; combo++; comboTimer=BALANCE.combo.timer; return; }
  if(a.down && A.knockdown){ en.state='down'; en.t=0; en.vx=dir*(a.kb+BALANCE.enemy.downKbBonus); }   // збиває з ніг
  else { en.state='hurt'; en.t=0; }
}
function hurtPlayer(dmg,kb,dir,shake){     // удар по гравцю (мілі або снаряд); пропускає, якщо iframe/hurt/високий стрибок
  if(player.iframe>0 || player.state==='hurt' || player.z>=BALANCE.world.jumpInvulnZ) return false;
  player.hp-=dmg; player.state='hurt'; player.t=0; player.iframe=BALANCE.player.hurtIframe; player.vx=dir*kb; player.vy=0; player.flash=BALANCE.feel.hitFlash;
  screenShake=Math.max(screenShake,shake); combo=0; comboTimer=0; return true;
}

function updateProjectiles(){
  for(const p of projectiles){ if(p.dead) continue; p.x+=p.vx; p.spin+=BALANCE.weapon.spin;
    if(p.x<-30||p.x>W+30){ p.dead=true; continue; }
    if(p.foe){                                               // ворожий снаряд — б'є гравця
      if(Math.abs(player.x-p.x)<BALANCE.weapon.projHit.x && Math.abs(player.y-p.y)<BALANCE.weapon.projHit.y
         && hurtPlayer(p.dmg,p.kb,p.face,BALANCE.feel.shakeBase+p.kb*BALANCE.feel.shakeKbMul)) p.dead=true;
      continue; }
    for(const en of enemies){ if(en.dead) continue;          // гравцева зброя — б'є ворогів
      if(Math.abs(en.x-p.x)<BALANCE.weapon.projHit.x && Math.abs(en.y-p.y)<BALANCE.weapon.projHit.y){ hitEnemy(en,{dmg:p.dmg,kb:p.kb,stop:BALANCE.weapon.throwStop,down:true},p.face); p.dead=true; break; } } }
  projectiles=projectiles.filter(p=>!p.dead);
}

/* ---------- ВОРОГИ / БОС ---------- */
let enemies=[]; let wave=0;
let dim=1, dimWave=0, phase='intro', phaseT=0;       // структура виміру: фаза (intro|fight|cleared) + лічильники
function spawnEnemy(typeKey){ const A=ENEMIES[typeKey], f=FIELD();
  const e={ type:typeKey, boss:A.boss, mini:false,
    x:Math.random()<0.5?-20:W+20, y:f.top+Math.random()*(f.bottom-f.top),
    z:0,vx:0,vy:0, hp:A.hp, hpMax:A.hp, state:'approach', t:0, dead:false, deadT:0,
    flash:0, face:1, speed:A.speedMin+Math.random()*A.speedRnd, cool:Math.random()*40 };
  enemies.push(e); return e; }
function curDim(){ return THEME.dimensions[(dim-1)%THEME.dimensions.length]; }   // циклічний індекс виміру
function dimWaves(){ return curDim().waves || BALANCE.dimension.waves; }
function pickEnemyType(){ const mix=curDim().mix; let tot=0; for(const m of mix) tot+=m[1]; let r=Math.random()*tot;
  for(const m of mix){ if((r-=m[1])<0) return m[0]; } return mix[0][0]; }                // зважений вибір зі складу виміру
function startDimension(){ phase='intro'; phaseT=BALANCE.dimension.introDur; dimWave=0;
  enemies=[]; projectiles=[]; weapons=[]; }
function spawnNextWave(){ dimWave++; const nw=dimWaves();
  if(dimWave===nw+2){ spawnEnemy('boss'); spawnEnemy('grunt'); }                       // фінальний бос + ескорт
  else if(dimWave===nw+1){ const m=spawnEnemy('brute'); m.mini=true; m.hp=m.hpMax=Math.round(ENEMIES.brute.hp*1.6); spawnEnemy('rusher'); }  // міні-бос
  else { wave++; const n=Math.min(BALANCE.waves.base+wave,BALANCE.waves.max);
    for(let i=0;i<n;i++) spawnEnemy(pickEnemyType()); } }                                // звичайна хвиля (склад виміру)
function director(){                                                                    // керує дугою виміру
  if(phase==='intro'){ if(--phaseT<=0){ phase='fight'; spawnNextWave(); } return; }
  if(phase==='cleared'){ if(--phaseT<=0){ dim++; player.hp=Math.min(player.hpMax,player.hp+BALANCE.dimension.healOnClear); startDimension(); } return; }
  if(enemies.length===0){                                                               // хвилю зачищено
    if(dimWave>=dimWaves()+2){ phase='cleared'; phaseT=BALANCE.dimension.clearedDur; return; }  // бос упав → вимір пройдено
    if(weapons.length<BALANCE.weapon.maxOnField && Math.random()<BALANCE.weapon.dropChance) spawnWeapon();
    spawnNextWave(); } }
function updateEnemy(en){
  const A=ENEMIES[en.type];
  if(en.dead){ en.deadT++; return; } if(en.flash>0) en.flash--; en.t++;
  const dx=player.x-en.x, dy=player.y-en.y; if(en.state!=='down') en.face=dx>0?1:-1;
  if(en.state==='down'){ en.x+=en.vx; en.vx*=0.85; if(en.t>BALANCE.enemy.downDur){ en.state='getup'; en.t=0; } clampField(en); return; }
  if(en.state==='getup'){ if(en.t>BALANCE.enemy.getupDur){ en.state='approach'; en.cool=BALANCE.enemy.getupCool; } return; }
  if(en.state==='hurt'){ en.x+=en.vx; en.y+=en.vy; en.vx*=0.82; en.vy*=0.82; if(en.t>BALANCE.enemy.hurtDur) en.state='approach'; clampField(en); return; }
  if(A.behavior==='ranged') updateRanged(en,A,dx,dy); else updateBruiser(en,A,dx,dy);   // диспетч по архетипу
}
function updateBruiser(en,A,dx,dy){                          // підбіг → замах → удар → відновлення
  if(en.state==='windup'){
    if(en.t>A.windup){ const adx=Math.abs(dx), ady=Math.abs(dy);
      if(adx<A.reach && ady<BALANCE.combat.hitDepth) hurtPlayer(A.dmg,A.kbToPlayer,en.face,A.shake);
      en.state='recover'; en.t=0; } return; }
  if(en.state==='recover'){ if(en.t>A.recover){ en.state='approach'; en.cool=A.coolAfter; } return; }
  const dist=Math.hypot(dx,dy); if(en.cool>0) en.cool--;
  if(dist>A.approachDist){ const len=dist||1; en.x+=dx/len*en.speed; en.y+=dy/len*en.speed*BALANCE.world.depthFactor; }
  else if(en.cool===0){ en.state='windup'; en.t=0; } clampField(en);
}
function updateRanged(en,A,dx,dy){                           // тримає дистанцію, цілиться, кидає снаряд
  const dist=Math.hypot(dx,dy); if(en.cool>0) en.cool--;
  if(en.state==='aim'){ if(en.t>A.shotWindup){ enemyShoot(en,A); en.state='recover'; en.t=0; } return; }
  if(en.state==='recover'){ if(en.t>A.recover){ en.state='approach'; en.cool=A.coolAfter; } return; }
  let mvx=0, mvy=0; const len=dist||1;
  if(dist<A.fleeDist){ mvx=-dx/len; mvy=-dy/len; }            // надто близько — відступ
  else if(dist>A.preferDist){ mvx=dx/len; mvy=dy/len; }       // далеко — підійти
  else if(en.cool===0){ en.state='aim'; en.t=0; return; }     // у вікні — приціл
  en.x+=mvx*en.speed; en.y+=mvy*en.speed*BALANCE.world.depthFactor; clampField(en);
}
function enemyShoot(en,A){ const dir=en.face;
  projectiles.push({ x:en.x+dir*14, y:en.y, vx:dir*A.shotSpeed, face:dir, foe:true,
    dmg:A.shotDmg, kb:A.shotKb, spin:0, dead:false }); }
function cullDead(){ enemies=enemies.filter(e=>!(e.dead&&e.deadT>30)); }

/* ---------- РЕНДЕР ---------- */
function drawShadow(x,y,r){ ctx.save(); ctx.globalAlpha=.28; ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(x,y,r,r*0.36,0,0,7); ctx.fill(); ctx.restore(); }
function drawFighter(e,col,acc,h,isAtk,atkInfo){
  const x=e.x, y=e.y, zz=e.z||0, by=y-zz;
  if(e.state==='down'){                       // лежить, збитий з ніг
    drawShadow(x,y,h*0.5);
    ctx.fillStyle=col; ctx.beginPath(); ctx.roundRect(x-h*0.55, y-18, h*1.05, 22, 11); ctx.fill();
    ctx.beginPath(); ctx.arc(x - e.face*(h*0.5), y-7, 11, 0, 7); ctx.fill();
    if(e.flash>0){ ctx.save(); ctx.globalAlpha=e.flash/6; ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.roundRect(x-h*0.55,y-18,h*1.05,22,11); ctx.fill(); ctx.restore(); }
    return;
  }
  drawShadow(x,y,22*(1-Math.min(zz,140)/280)*(h/48));
  ctx.fillStyle=col; ctx.beginPath(); ctx.roundRect(x-h*0.31,by-h*1.12,h*0.62,h*1.06,12); ctx.fill();
  const hr=h*0.25; ctx.beginPath(); ctx.arc(x,by-h*1.16,hr,0,7); ctx.fill();
  ctx.fillStyle=acc; ctx.fillRect(x-h*0.31,by-h*0.62,h*0.62,4);
  ctx.fillStyle='rgba(8,10,18,.9)'; ctx.beginPath(); ctx.arc(x+e.face*hr*0.5,by-h*1.18,hr*0.27,0,7); ctx.fill();
  ctx.fillStyle=col; ctx.beginPath(); ctx.ellipse(x+e.face*(h*0.25),by-3,7,4,0,0,7); ctx.fill();
  if(isAtk && atkInfo){ ctx.fillStyle=acc; const r=atkInfo.reach;
    ctx.beginPath(); ctx.roundRect(x+(e.face>0?10:-10-r),by-h*0.78,r,9,4); ctx.fill(); }
  if(e.flash>0){ ctx.save(); ctx.globalAlpha=e.flash/6; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.roundRect(x-h*0.31,by-h*1.12,h*0.62,h*1.12,12); ctx.fill(); ctx.restore(); }
}
// малює піксель-сітку спрайта: межі округлюємо до цілих → крихкі пікселі без швів.
// footX/footY — точка під ногами (низ-центр). face<0 → дзеркалимо по колонках. tint — перефарбувати все (флеш).
function drawSpritePixels(spr, footX, footY, s, face, tint){
  const SW=spr.w, SH=spr.h, pal=spr.pal, rows=spr.px;
  const ox=footX-(SW*s)/2, oy=footY-SH*s;
  for(let r=0;r<SH;r++){ const row=rows[r];
    const y0=Math.round(oy+r*s), y1=Math.round(oy+(r+1)*s);
    for(let c=0;c<SW;c++){ const ch=row[face<0?(SW-1-c):c];
      if(!ch||ch==='.') continue; const col=tint||pal[ch]; if(!col) continue;
      const x0=Math.round(ox+c*s), x1=Math.round(ox+(c+1)*s);
      ctx.fillStyle=col; ctx.fillRect(x0,y0,x1-x0,y1-y0); } }
}
function drawHero(p, isAtk){
  const sk=curSkin(), spr=sk.sprite, h=54, zz=p.z||0, by=p.y-zz;
  const s=h*1.7/spr.h;                                   // висота на екрані ≈ h*1.7 (~92px), однакова для всіх шкір
  drawShadow(p.x, p.y, 22*(1-Math.min(zz,140)/280));
  const bob = p.state==='walk' ? -(Math.floor(tick/6)%2)*Math.round(s*0.5) : 0;  // 2-кадровий «крок»
  const lunge = isAtk ? p.face*s*1.5 : 0;                // випад уперед на ударі
  const footX=p.x+lunge, footY=by+bob+1;
  drawSpritePixels(spr, footX, footY, s, p.face, null);
  if(p.flash>0){ ctx.save(); ctx.globalAlpha=Math.min(1,p.flash/6);
    drawSpritePixels(spr, footX, footY, s, p.face, '#fff'); ctx.restore(); }
  if(isAtk){ const reach=(p.atk&&p.atk.reach)||44, fy=footY-spr.h*s*0.52;  // кулак (без окремого кадру)
    const fx=p.x+p.face*reach*0.62; ctx.fillStyle=sk.accent;
    ctx.fillRect(Math.round(p.face>0?fx:fx-s*3), Math.round(fy), Math.round(s*3), Math.round(s*3)); }
}
function drawWeaponInHand(p){
  const swinging=p.state==='attack' && p.atkName==='wpn', by=p.y-(p.z||0), w=WEAPONS[p.weapon.type];
  ctx.save(); ctx.translate(p.x+p.face*15, by-54*0.6); ctx.scale(p.face,1); ctx.rotate(swinging?-0.45:-0.95);
  ctx.strokeStyle=w.color; ctx.fillStyle=w.color; ctx.lineCap='round';
  const len=swinging?w.reach*0.66:26;
  if(p.weapon.type==='pipe'){ ctx.lineWidth=7; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(len,0); ctx.stroke(); }
  else { ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(len,0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(len,-6); ctx.lineTo(len+11,0); ctx.lineTo(len,6); ctx.closePath(); ctx.fill(); }
  ctx.restore();
}
function drawGroundWeapon(g){
  const bob=Math.sin((tick+g.bob*20)/18)*3, y=g.y-10+bob, w=WEAPONS[g.type];
  drawShadow(g.x,g.y,13);
  ctx.save(); ctx.globalAlpha=.22; ctx.fillStyle=w.color; ctx.beginPath(); ctx.arc(g.x,y,17,0,7); ctx.fill(); ctx.restore();
  ctx.strokeStyle=w.color; ctx.fillStyle=w.color; ctx.lineCap='round';
  if(g.type==='pipe'){ ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(g.x-14,y); ctx.lineTo(g.x+14,y); ctx.stroke(); }
  else { ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(g.x-12,y); ctx.lineTo(g.x+8,y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(g.x+8,y-5); ctx.lineTo(g.x+18,y); ctx.lineTo(g.x+8,y+5); ctx.closePath(); ctx.fill(); }
}
function hpBar(x,y,w,hp,max,col){ ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(x,y,w,7);
  ctx.fillStyle=col; ctx.fillRect(x,y,w*Math.max(0,hp/max),7);
  ctx.strokeStyle='rgba(255,255,255,.25)'; ctx.strokeRect(x+.5,y+.5,w-1,6); }
function drawJoystick(){ if(joyId===null) return; ctx.save();
  ctx.globalAlpha=.25; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(joyOrigin.x,joyOrigin.y,60,0,7); ctx.fill();
  ctx.globalAlpha=.6; ctx.beginPath(); ctx.arc(joyOrigin.x+joyVec.x*60,joyOrigin.y+joyVec.y*60,26,0,7); ctx.fill(); ctx.restore(); }
function drawButton(c,label,pressed){ ctx.save();
  ctx.globalAlpha=pressed?.5:.22; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(c.x,c.y,c.r,0,7); ctx.fill();
  ctx.globalAlpha=.85; ctx.fillStyle='#fff'; ctx.font='600 13px system-ui'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(label,c.x,c.y); ctx.restore(); }

function render(){
  const D=curDim();
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,D.bg[0]); g.addColorStop(1,D.bg[1]);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  const f=FIELD(); ctx.fillStyle=D.floor||'rgba(255,255,255,.03)'; ctx.fillRect(0,f.top-30,W,H-f.top+30);

  ctx.save();
  if(screenShake>0.3) ctx.translate((Math.random()-.5)*screenShake,(Math.random()-.5)*screenShake);
  for(const g2 of weapons) drawGroundWeapon(g2);
  const all=[{e:player,p:true},...enemies.map(e=>({e,p:false}))]; all.sort((a,b)=>a.e.y-b.e.y);
  for(const o of all){
    if(o.p){ const isAtk=player.state==='attack' && player.t>=player.atk.active[0] && player.t<=player.atk.active[1];
      drawHero(player, isAtk && player.atkName!=='wpn');
      if(player.weapon) drawWeaponInHand(player);
    } else { if(o.e.dead && o.e.deadT>30) continue;
      const A=ENEMIES[o.e.type], th=THEME.enemies[A.theme];
      ctx.save(); if(o.e.dead) ctx.globalAlpha=Math.max(0,1-o.e.deadT/30);
      drawFighter(o.e,th.body,th.accent,A.h,false,null);
      if(A.behavior==='ranged' && o.e.state==='aim'){        // телеграф пострілу — росте на руці
        const by=o.e.y-(o.e.z||0), k=Math.min(1,o.e.t/A.shotWindup);
        ctx.fillStyle=th.accent; ctx.beginPath(); ctx.arc(o.e.x+o.e.face*16,by-A.h*0.7,3+5*k,0,7); ctx.fill(); }
      ctx.restore(); } }
  for(const p of projectiles){ ctx.save();
    if(p.foe){ ctx.translate(p.x,p.y-30);                    // ворожий снаряд — світлий згусток
      ctx.fillStyle='#ff9a5f'; ctx.globalAlpha=.9; ctx.beginPath(); ctx.arc(0,0,6,0,7); ctx.fill();
      ctx.globalAlpha=.28; ctx.beginPath(); ctx.arc(0,0,11,0,7); ctx.fill(); }
    else { const w=WEAPONS[p.type]; ctx.translate(p.x,p.y-30); ctx.rotate(p.spin);
      ctx.strokeStyle=w.color; ctx.lineWidth=5; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(-14,0); ctx.lineTo(14,0); ctx.stroke(); }
    ctx.restore(); }
  ctx.restore();

  // HUD
  ctx.fillStyle='#cfe9e4'; ctx.font='700 13px system-ui'; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.fillText(curSkin().name,16,24); hpBar(16,30,180,player.hp,player.hpMax,curSkin().body);
  { const sb=btnSkin(); ctx.save(); ctx.fillStyle='rgba(255,255,255,.08)'; ctx.fillRect(sb.x,sb.y,sb.w,sb.h);
    ctx.fillStyle=curSkin().accent; ctx.font='700 11px system-ui'; ctx.textBaseline='middle';
    ctx.fillText('АРТ: '+curSkin().name+'  [T]', sb.x+8, sb.y+sb.h/2); ctx.restore(); ctx.textBaseline='alphabetic'; }
  if(player.weapon){ const w=WEAPONS[player.weapon.type];
    ctx.fillStyle=w.color; ctx.font='700 12px system-ui'; ctx.fillText(w.name,16,54);
    for(let i=0;i<player.weapon.uses;i++) ctx.fillRect(78+i*9,45,6,9); }
  else { ctx.fillStyle='#5b6480'; ctx.font='600 11px system-ui'; ctx.fillText('без зброї',16,53); }
  ctx.textAlign='right'; ctx.fillStyle='#9aa4bf'; ctx.font='700 13px system-ui';
  const _nw=dimWaves(), _st = phase==='intro'?'готуйся' : phase==='cleared'?'зачищено' : dimWave>=_nw+2?'БОС' : dimWave>=_nw+1?'міні-бос' : 'хвиля '+dimWave+'/'+_nw;
  ctx.fillText('ВИМІР '+dim+' · '+_st, W-16, 24);

  const boss=enemies.find(e=>e.boss && !e.dead);
  if(boss){ ctx.textAlign='center'; ctx.fillStyle=THEME.enemies.boss.accent; ctx.font='700 12px system-ui';
    ctx.fillText('БОС — '+THEME.enemies.boss.name, W/2, 52); hpBar(W/2-120,58,240,boss.hp,boss.hpMax,THEME.enemies.boss.body); }
  const mini=enemies.find(e=>e.mini && !e.dead);
  if(mini){ ctx.textAlign='center'; ctx.fillStyle=THEME.enemies.brute.accent; ctx.font='700 11px system-ui';
    ctx.fillText('МІНІ-БОС — '+THEME.enemies.brute.name, W/2, 52); hpBar(W/2-90,58,180,mini.hp,mini.hpMax,THEME.enemies.brute.body); }

  if(combo>1 && comboTimer>0){ ctx.save(); ctx.textAlign='center';
    const s=1+Math.min(combo,30)*0.02; ctx.font='800 '+Math.floor(34*s)+'px system-ui';
    ctx.fillStyle='#fff'; ctx.globalAlpha=Math.min(1,comboTimer/30); ctx.fillText(combo+' HIT',W/2,H*0.32); ctx.restore(); }

  if(phase==='intro'){ const D=curDim(); ctx.save(); ctx.textAlign='center'; ctx.globalAlpha=Math.min(1,phaseT/24);
    ctx.fillStyle='#7f8aa8'; ctx.font='700 13px system-ui'; ctx.fillText('ВИМІР '+dim,W/2,H*0.40-34);
    ctx.fillStyle='#fff'; ctx.font='800 38px system-ui'; ctx.fillText(D.name,W/2,H*0.40);
    ctx.fillStyle='#9aa4bf'; ctx.font='600 15px system-ui'; ctx.fillText(D.flavor,W/2,H*0.40+28); ctx.restore(); }
  if(phase==='cleared'){ ctx.save(); ctx.textAlign='center'; ctx.globalAlpha=Math.min(1,phaseT/24);
    ctx.fillStyle='#bff7ef'; ctx.font='800 34px system-ui'; ctx.fillText('ВИМІР ЗАЧИЩЕНО',W/2,H*0.40);
    ctx.fillStyle='#9aa4bf'; ctx.font='600 14px system-ui'; ctx.fillText('наступний портал…',W/2,H*0.40+28); ctx.restore(); }

  drawJoystick();
  drawButton(btnLight(), player.weapon?'МАХ':'УДАР', lightTouchId!==null);
  drawButton(btnJump(),'СТРИБ', jumpTouchId!==null);
  drawButton(btnSpecial(), player.weapon?'КИДОК':'СПЕЦ', specialTouchId!==null);
}

/* ---------- ЦИКЛ ---------- */
startDimension();
function frame(){
  pollInput();
  if(hitStop>0){ hitStop--; }
  else { updatePlayer(); for(const en of enemies) updateEnemy(en); updateProjectiles(); cullDead(); director();
    if(comboTimer>0){ comboTimer--; if(comboTimer===0) combo=0; }
    if(player.hp<=0){ player.hp=player.hpMax; player.x=W*0.3; player.y=H*0.7; player.z=0; player.vz=0;
      player.state='idle'; player.weapon=null; player.breakAfter=false; combo=0; startDimension(); } }   // смерть → рестарт виміру
  if(screenShake>0) screenShake*=BALANCE.feel.shakeDecay;
  lightEdge=false; specialEdge=false; jumpEdge=false; tick++;
  render(); requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
